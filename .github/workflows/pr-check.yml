name: AnhEmMotor Backend - Pull Request (Pre-deploy) check

on:
  pull_request:
    branches: ["master", "main"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Check Migration Count
        shell: bash
        run: |
          FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -E 'Infrastructure/(Migrations|MySqlMigrations|PostgreSqlMigrations)/' | grep '\.cs$' | grep -v '\.Designer\.cs' | grep -v 'ModelSnapshot\.cs' || true)
          if [ -z "$FILES" ]; then
            echo "No new migrations found. Check passed."
            exit 0
          fi
          echo "Checking migrations per provider..."
          FAILED=0
          for DIR in $(echo "$FILES" | xargs -n1 dirname | sort -u); do
            COUNT=$(echo "$FILES" | grep "^$DIR/" | sed 's/.*\///' | sed -E 's/^[0-9]+_(.*)\.cs$/\1/' | sort -u | wc -l)
            if [ "$COUNT" -gt 1 ]; then
              echo "::error::Provider '$DIR' has $COUNT unique migrations. Only 1 is allowed per PR."
              FAILED=1
            else
              echo "  - $DIR: $COUNT migration(s) [OK]"
            fi
          done
          if [ "$FAILED" -eq 1 ]; then
            exit 1
          fi

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

      - name: Run Unit Tests
        run: dotnet test UnitTests/UnitTests.csproj --no-build --verbosity minimal --logger "console;verbosity=minimal"
        env:
          Logging__LogLevel__Default: "Warning"
          Logging__LogLevel__Microsoft.EntityFrameworkCore.Database.Command: "None"

      - name: Run Controller Tests
        run: dotnet test ControllerTests/ControllerTests.csproj --no-build --verbosity minimal --logger "console;verbosity=minimal"
        env:
          Logging__LogLevel__Default: "Warning"
          Logging__LogLevel__Microsoft.EntityFrameworkCore.Database.Command: "None"

      - name: Run Integration Tests
        run: dotnet test IntegrationTests/IntegrationTests.csproj --no-build --verbosity minimal --logger "console;verbosity=minimal"
        env:
          Logging__LogLevel__Default: "Warning"
          Logging__LogLevel__Microsoft.EntityFrameworkCore.Database.Command: "None"
