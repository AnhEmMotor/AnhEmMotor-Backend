name: AnhEmMotor Backend - Pull Request (Pre-deploy) check

on:
  pull_request:
    branches: ["master", "main"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Check Migration Count
        shell: bash
        run: |
          # Use --diff-filter=A to only catch NEW files added in this PR
          # Compare directly against origin/base_ref to exclude migrations already in main
          FILES=$(git diff --name-only --diff-filter=A origin/${{ github.base_ref }} HEAD | grep -E 'Infrastructure/(Migrations|MySqlMigrations|PostgreSqlMigrations)/' | grep '\.cs$' | grep -v '\.Designer\.cs' | grep -v 'ModelSnapshot\.cs' || true)
          
          if [ -z "$FILES" ]; then
            echo "No new migrations found. Check passed."
            exit 0
          fi

          echo "Detected new migration files:"
          echo "$FILES"
          echo "--------------------------------"
          
          echo "Checking migrations per provider..."
          FAILED=0
          # Get unique directories
          DIRS=$(echo "$FILES" | xargs -n1 dirname | sort -u)
          
          for DIR in $DIRS; do
            # Extract unique migration names (ignoring timestamps)
            UNIQUE_NAMES=$(echo "$FILES" | grep "^$DIR/" | sed 's/.*\///' | sed -E 's/^[0-9]+_(.*)\.cs$/\1/' | sort -u)
            COUNT=$(echo "$UNIQUE_NAMES" | wc -l)
            
            if [ "$COUNT" -gt 1 ]; then
              echo "::error::Provider '$DIR' has $COUNT unique migrations. Only 1 is allowed per PR."
              echo "Migrations found: "
              echo "$UNIQUE_NAMES"
              FAILED=1
            else
              echo "  - $DIR: $COUNT migration(s) [OK] ($UNIQUE_NAMES)"
            fi
          done
          
          if [ "$FAILED" -eq 1 ]; then
            exit 1
          fi

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

      - name: Run Unit Tests
        run: dotnet test UnitTests/UnitTests.csproj --no-build --verbosity minimal --logger "console;verbosity=minimal"
        env:
          Logging__LogLevel__Default: "Warning"
          Logging__LogLevel__Microsoft.EntityFrameworkCore.Database.Command: "None"

      - name: Run Controller Tests
        run: dotnet test ControllerTests/ControllerTests.csproj --no-build --verbosity minimal --logger "console;verbosity=minimal"
        env:
          Logging__LogLevel__Default: "Warning"
          Logging__LogLevel__Microsoft.EntityFrameworkCore.Database.Command: "None"

      - name: Run Integration Tests
        run: dotnet test IntegrationTests/IntegrationTests.csproj --no-build --verbosity minimal --logger "console;verbosity=minimal"
        env:
          Logging__LogLevel__Default: "Warning"
          Logging__LogLevel__Microsoft.EntityFrameworkCore.Database.Command: "None"
