name: AnhEmMotor Backend - Pull Request (Pre-deploy) check

on:
  pull_request:
    branches: ["master", "main"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Check Migration Count
        shell: bash
        run: |
          git fetch origin ${{ github.base_ref }} --depth=1
          NEW_MIGRATIONS=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep 'Migrations/' | grep '\.cs$' | grep -v '\.Designer\.cs' | grep -v 'ModelSnapshot\.cs' | wc -l)
          if [ "$NEW_MIGRATIONS" -gt 1 ]; then
            echo "Error: Only 1 migration per PR is allowed. You have $NEW_MIGRATIONS."
            exit 1
          fi

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

      - name: Run Unit Tests
        run: dotnet test UnitTests/UnitTests.csproj --no-build --verbosity minimal --logger "console;verbosity=minimal"
        env:
          Logging__LogLevel__Default: "Warning"
          Logging__LogLevel__Microsoft.EntityFrameworkCore.Database.Command: "None"

      - name: Run Controller Tests
        run: dotnet test ControllerTests/ControllerTests.csproj --no-build --verbosity minimal --logger "console;verbosity=minimal"
        env:
          Logging__LogLevel__Default: "Warning"
          Logging__LogLevel__Microsoft.EntityFrameworkCore.Database.Command: "None"

      - name: Run Integration Tests
        run: dotnet test IntegrationTests/IntegrationTests.csproj --no-build --verbosity minimal --logger "console;verbosity=minimal"
        env:
          Logging__LogLevel__Default: "Warning"
          Logging__LogLevel__Microsoft.EntityFrameworkCore.Database.Command: "None"
