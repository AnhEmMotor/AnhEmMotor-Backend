name: AnhEmMotor Backend - Deploy
on:
  push:
    branches:
      - master
      - main
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
      - name: Prepare AppSettings
        run: |
          cp WebAPI/appsettings.Template.json appsettings.Production.json
          sed -i '/^[[:blank:]]*\/\//d' appsettings.Production.json
          sed -i 's|[[:blank:]]\+//.*||g' appsettings.Production.json
      - name: Inject Secrets
        env:
          ALLOWED_HOSTS: ${{ secrets.ALLOWED_HOSTS }}
          CORS_ALLOWED_ORIGINS: ${{ secrets.CORS_ALLOWED_ORIGINS }}
          DB_CONNECTION_STRING: ${{ secrets.DB_CONNECTION_STRING }}
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          JWT_ISSUER: ${{ secrets.JWT_ISSUER }}
          JWT_AUDIENCE: ${{ secrets.JWT_AUDIENCE }}
          SUPER_ROLES_LIST: ${{ secrets.SUPER_ROLES_LIST || '[]' }}
          PROTECTED_USERS_LIST: ${{ secrets.PROTECTED_USERS_LIST || '[]' }}
          DEFAULT_ROLES_FOR_NEW_USER_LIST: ${{ secrets.DEFAULT_ROLES_FOR_NEW_USER_LIST || '[]' }}
          ENABLE_DATABASE_SEEDING: ${{ secrets.ENABLE_DATABASE_SEEDING || 'false' }}
          COOKIE_DOMAIN: ${{ secrets.COOKIE_DOMAIN }}
          OTLP_ENDPOINT: ${{ secrets.OTLP_ENDPOINT }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          FACEBOOK_APP_ID: ${{ secrets.FACEBOOK_APP_ID }}
          FACEBOOK_APP_SECRET: ${{ secrets.FACEBOOK_APP_SECRET }}
          VNPAY_TMN_CODE: ${{ secrets.VNPAY_TMN_CODE }}
          VNPAY_HASH_SECRET: ${{ secrets.VNPAY_HASH_SECRET }}
          VNPAY_BASE_URL: ${{ secrets.VNPAY_BASE_URL }}
          VNPAY_CALLBACK_URL: ${{ secrets.VNPAY_CALLBACK_URL }}
          PAYOS_CLIENT_ID: ${{ secrets.PAYOS_CLIENT_ID }}
          PAYOS_API_KEY: ${{ secrets.PAYOS_API_KEY }}
          PAYOS_CHECKSUM_KEY: ${{ secrets.PAYOS_CHECKSUM_KEY }}
          PAYOS_BASE_URL: ${{ secrets.PAYOS_BASE_URL }}
          PAYOS_RETURN_URL: ${{ secrets.PAYOS_RETURN_URL }}
          PAYOS_CANCEL_URL: ${{ secrets.PAYOS_CANCEL_URL }}
        run: >
          jq '
            .Provider = "PostgreSql" |
            .AllowedHosts = env.ALLOWED_HOSTS |
            .Cors.AllowedOrigins = env.CORS_ALLOWED_ORIGINS |
            .ConnectionStrings.StringConnection = env.DB_CONNECTION_STRING |
            .Jwt.Key = env.JWT_SECRET_KEY |
            .Jwt.Issuer = env.JWT_ISSUER |
            .Jwt.Audience = env.JWT_AUDIENCE |
            .ProtectedAuthorizationEntities.SuperRoles = (env.SUPER_ROLES_LIST | fromjson) |
            .ProtectedAuthorizationEntities.ProtectedUsers = (env.PROTECTED_USERS_LIST | fromjson) |
            .ProtectedAuthorizationEntities.DefaultRolesForNewUsers = (env.DEFAULT_ROLES_FOR_NEW_USER_LIST | fromjson) |
            .SeedingOptions.RunDataSeedingOnStartup = (env.ENABLE_DATABASE_SEEDING | fromjson) |
            .CookieDomain = env.COOKIE_DOMAIN |
            .OpenTelemetry.OtlpEndpoint = env.OTLP_ENDPOINT |
            .Authentication.Google.ClientId = env.GOOGLE_CLIENT_ID |
            .Authentication.Google.ClientSecret = env.GOOGLE_CLIENT_SECRET |
            .Authentication.Facebook.AppId = env.FACEBOOK_APP_ID |
            .Authentication.Facebook.AppSecret = env.FACEBOOK_APP_SECRET |
            .VNPay.TmnCode = env.VNPAY_TMN_CODE |
            .VNPay.HashSecret = env.VNPAY_HASH_SECRET |
            .VNPay.BaseUrl = env.VNPAY_BASE_URL |
            .VNPay.CallbackUrl = env.VNPAY_CALLBACK_URL |
            .PayOS.ClientId = env.PAYOS_CLIENT_ID |
            .PayOS.ApiKey = env.PAYOS_API_KEY |
            .PayOS.ChecksumKey = env.PAYOS_CHECKSUM_KEY |
            .PayOS.BaseUrl = env.PAYOS_BASE_URL |
            .PayOS.ReturnUrl = env.PAYOS_RETURN_URL |
            .PayOS.CancelUrl = env.PAYOS_CANCEL_URL
          ' appsettings.Production.json > tmp.json && mv tmp.json appsettings.Production.json
      - name: Restore dependencies
        run: dotnet restore
      - name: Build
        run: dotnet build WebAPI/WebAPI.csproj --configuration Release --no-restore
      - name: Install EF Core Tools
        run: dotnet tool install --global dotnet-ef
      - name: Generate PostgreSQL Migration Bundle
        run: >
          cd Infrastructure

          dotnet ef migrations bundle --self-contained -r linux-x64 --context PostgreSqlDbContext --output ../postgres_bundle

          cd ..
        continue-on-error: true
      - name: Publish
        run:
          dotnet publish WebAPI/WebAPI.csproj --configuration Release --no-build
          --output ./publish
      - name: Move AppSettings to Publish Folder
        run: cp appsettings.Production.json ./publish/
      - name: Move Migration Bundle to Publish Folder
        run: |
          if [ -f postgres_bundle ]; then
            mv postgres_bundle ./publish/
          fi
        continue-on-error: true
      - name: Clean Remote Directory
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PRODUCTION_SERVER_IP }}
          username: ${{ secrets.PRODUCTION_SERVER_USERNAME }}
          key: ${{ secrets.SERVER_REMOTE_ACCESS_PRIVATE_KEY }}
          port: 22
          script: |
            rm -rf /var/www/anhemmotor/backend/*
      - name: Copy Files via SCP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.PRODUCTION_SERVER_IP }}
          username: ${{ secrets.PRODUCTION_SERVER_USERNAME }}
          key: ${{ secrets.SERVER_REMOTE_ACCESS_PRIVATE_KEY }}
          port: 22
          source: ./publish/*
          target: /var/www/anhemmotor/backend
          strip_components: 1
      - name: Execute Remote SSH Commands
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PRODUCTION_SERVER_IP }}
          username: ${{ secrets.PRODUCTION_SERVER_USERNAME }}
          key: ${{ secrets.SERVER_REMOTE_ACCESS_PRIVATE_KEY }}
          port: 22
          script: >
            if [ -f /var/www/anhemmotor/backend/postgres_bundle ]; then
              chmod +x /var/www/anhemmotor/backend/postgres_bundle
              /var/www/anhemmotor/backend/postgres_bundle --connection "${{ secrets.DB_CONNECTION_STRING }}"
              rm /var/www/anhemmotor/backend/postgres_bundle
            fi

            sudo systemctl restart anhemmotor.service
