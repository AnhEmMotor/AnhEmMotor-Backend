name: Deploy Production from Template

on:
  push:
    branches:
      - master
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: Production

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Prepare AppSettings
        run: |
          cp WebAPI/appsettings.Template.json appsettings.Production.json
          sed -i '/^[[:blank:]]*\/\//d' appsettings.Production.json
          sed -i 's|[[:blank:]]\+//.*||g' appsettings.Production.json

      - name: Inject Secrets
        uses: microsoft/variable-substitution@v1
        with:
          files: "appsettings.Production.json"
        env:
          AllowedHosts: ${{ secrets.ALLOWED_HOSTS }}
          Cors.AllowedOrigins: ${{ secrets.CORS_ALLOWED_ORIGINS }}
          ConnectionStrings.StringConnection: ${{ secrets.DB_CONNECTION_STRING }}
          Jwt.Key: ${{ secrets.JWT_SECRET_KEY }}
          Jwt.Issuer: ${{ secrets.JWT_ISSUER }}
          Jwt.Audience: ${{ secrets.JWT_AUDIENCE }}
          ProtectedAuthorizationEntities.SuperRoles: ${{ secrets.SUPER_ROLES_LIST }}
          ProtectedAuthorizationEntities.ProtectedUsers: ${{ secrets.PROTECTED_USERS_LIST }}
          ProtectedAuthorizationEntities.DefaultRolesForNewUsers: ${{ secrets.DEFAULT_ROLES_FOR_NEW_USER_LIST }}
          SeedingOptions.RunDataSeedingOnStartup: ${{ secrets.ENABLE_DATABASE_SEEDING }}

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build WebAPI/WebAPI.csproj --configuration Release --no-restore

      - name: Install EF Core Tools
        run: dotnet tool install --global dotnet-ef

      - name: Generate PostgreSQL Migration Bundle
        run: |
          cd Infrastructure
          dotnet ef migrations bundle --self-contained -r linux-x64 --context PostgreSqlDbContext --output ../postgres_bundle
          cd ..
        continue-on-error: true

      - name: Publish
        run: dotnet publish WebAPI/WebAPI.csproj --configuration Release --no-build --output ./publish

      - name: Move AppSettings to Publish Folder
        run: cp appsettings.Production.json ./publish/

      - name: Move Migration Bundle to Publish Folder
        run: |
          if [ -f postgres_bundle ]; then
            mv postgres_bundle ./publish/
          fi
        continue-on-error: true

      - name: Clean Remote Directory
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PRODUCTION_SERVER_IP }}
          username: ${{ secrets.PRODUCTION_SERVER_USERNAME }}
          key: ${{ secrets.SERVER_REMOTE_ACCESS_PRIVATE_KEY }}
          port: 22
          script: |
            rm -rf /var/www/anhemmotor/backend/*

      - name: Copy Files via SCP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.PRODUCTION_SERVER_IP }}
          username: ${{ secrets.PRODUCTION_SERVER_USERNAME }}
          key: ${{ secrets.SERVER_REMOTE_ACCESS_PRIVATE_KEY }}
          port: 22
          source: "./publish/*"
          target: "/var/www/anhemmotor/backend"
          strip_components: 1

      - name: Execute Remote SSH Commands
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PRODUCTION_SERVER_IP }}
          username: ${{ secrets.PRODUCTION_SERVER_USERNAME }}
          key: ${{ secrets.SERVER_REMOTE_ACCESS_PRIVATE_KEY }}
          port: 22
          script: |
            if [ -f /var/www/anhemmotor/backend/postgres_bundle ]; then
              chmod +x /var/www/anhemmotor/backend/postgres_bundle
              /var/www/anhemmotor/backend/postgres_bundle --connection "${{ secrets.DB_CONNECTION_STRING }}"
              rm /var/www/anhemmotor/backend/postgres_bundle
            fi
            sed -i 's/\r$//' /var/www/anhemmotor/scripts/restart_backend.sh
            chmod +x /var/www/anhemmotor/scripts/restart_backend.sh
            bash /var/www/anhemmotor/scripts/restart_backend.sh
